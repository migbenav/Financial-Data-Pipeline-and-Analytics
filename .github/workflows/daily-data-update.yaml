name: Daily Data Update

on:
  schedule:
    # Corre a las 5:00 AM de Perú (10:00 AM UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-data-loader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # De v3 a v4
        uses: actions/checkout@v4

      - name: Set up Python
        # De v4 a v5
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # TIP: setup-python@v5 ya tiene cache integrado, podrías simplificarlo luego
          cache: 'pip' 

      - name: Cache Python dependencies
        # De v3 a v4
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Supabase/Alpha Vantage secrets
        run: |
          echo "ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}" >> .env
          echo "SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}" >> .env
          echo "COIN_MARKET_API_KEY=${{ secrets.COIN_MARKET_API_KEY }}" >> .env

      - name: Run daily data update
        run: python daily_update.py
